[env:esp32dev]
platform  = espressif32@6.12.0  ; framework-arduinoespressif32 @ 3.20017 (instalado)
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit MCP4725 @ ^2.0.2
    adafruit/Adafruit BusIO @ ^1.16.1
    bodmer/TFT_eSPI @ ^2.5.43

lib_compat_mode = off
monitor_speed   = 115200

build_flags =
    -std=gnu++17
    -I include
    ; Framework v2.x (ESP-IDF v4): gpio_ll.h disponivel, TFT_eSPI 2.5.x ok
    ; Reduz verbosidade de warnings do IDF que nao sao nossos
    -DCORE_DEBUG_LEVEL=0
    ; TFT_eSPI: aponta para o arquivo de configuração do display
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTOUCH_CS=17
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; ── Upload OTA via Access Point ───────────────────────────────────────────────
; upload_protocol = espota
; upload_port     = 192.168.4.1
; upload_flags    = --timeout=60
