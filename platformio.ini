[env:esp32dev]
platform  = espressif32@6.12.0  ; framework-arduinoespressif32 @ 3.20017
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit MCP4725 @ ^2.0.2
    adafruit/Adafruit BusIO @ ^1.16.1
    bodmer/TFT_eSPI @ ^2.5.43
    ; OTA via página web — versões fixadas para compatibilidade mútua
    mathieucarbou/AsyncTCP @ 3.2.3
    mathieucarbou/ESPAsyncWebServer @ 3.3.12
    ayushsharma82/ElegantOTA @ 3.1.5

lib_compat_mode = off
monitor_speed   = 115200
board_upload.flash_size = 4MB
board_build.partitions  = partitions.csv

build_flags =
    -std=gnu++17
    -I include
    -DCORE_DEBUG_LEVEL=0
    ; ElegantOTA: modo assíncrono
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    ; TFT_eSPI pinagem
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTOUCH_CS=17
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
