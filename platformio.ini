[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit MCP4725 @ ^2.0.2
    adafruit/Adafruit BusIO @ ^1.16.1
    khoih-prog/ESP_DoubleResetDetector @ ^1.1.4

lib_compat_mode = off
monitor_speed   = 115200

build_flags =
    -std=gnu++17
    -I include

; ── Upload OTA via Access Point ───────────────────────────────────────────────
; Após duplo reset, conecte o notebook na rede "Fonte-OTA" e descomente:
;
; upload_protocol = espota
; upload_port     = 192.168.4.1
; upload_flags    = --timeout=60
;
; Ou use o hostname mDNS (requer mDNS no SO):
; upload_port     = fonte-bancada.local
