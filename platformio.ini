[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Bibliotecas de terceiros
lib_deps =
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit MCP4725 @ ^2.0.2
    adafruit/Adafruit BusIO @ ^1.16.1

; lib/ na raiz é detectada automaticamente pelo PlatformIO LDF.
; lib_compat_mode = off desabilita filtragem agressiva que às vezes
; ignora libs locais sem dependências declaradas explicitamente.
lib_compat_mode = off

monitor_speed = 115200

; -I aponta o include/ do projeto para todas as unidades de compilação,
; incluindo as libs em lib/app, lib/control e lib/hal.
build_flags =
    -std=gnu++17
    -I include
